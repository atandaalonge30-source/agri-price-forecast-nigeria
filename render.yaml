services:
  - type: web
    name: agri-price-forecast
    env: python
    plan: free
    buildCommand: pip install -r agri_price_forecast/requirements.txt
    startCommand: streamlit run agri_price_forecast/app/app.py --server.port=10000 --server.address=0.0.0.0
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
